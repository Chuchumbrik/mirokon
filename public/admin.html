<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirokon - Admin Dashboard</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      margin: 0; 
      color: white; 
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .tab {
      padding: 12px 24px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
      font-size: 16px;
    }
    .tab.active, .tab:hover {
      background: rgba(255,255,255,0.4);
    }
    .tabs {
      display: flex;
      gap: 10px;
    }
    .logout {
      padding: 12px 24px;
      background: #ff6b6b;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }
    .logout:hover {
      background: #ff5252;
    }
    .section {
      display: none;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .section.active {
      display: block;
    }
    h2, h3 {
      margin-top: 0;
    }
    .table-container {
      overflow-x: auto;
      margin: 20px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    th {
      background: rgba(255,255,255,0.3);
    }
    form {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.9);
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea {
      height: 100px;
      resize: vertical;
    }
    button {
      padding: 10px 20px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
      font-size: 14px;
    }
    button:hover {
      background: #00f2fe;
    }
    .delete-btn {
      background: #ff6b6b;
    }
    .delete-btn:hover {
      background: #ff5252;
    }
    @media (max-width: 768px) {
      .tabs {
        flex-direction: column;
      }
      .header {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="tabs">
        <button class="tab active" data-tab="works" onclick="switchTab('works')">
          Works
        </button>
        <button class="tab" data-tab="reviews" onclick="switchTab('reviews')">
          Reviews
        </button>
        <button class="tab" data-tab="news" onclick="switchTab('news')">
          News
        </button>
      </div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div id="works" class="section active">
      <h2>Works Management</h2>
      <button onclick="loadData('works')">Refresh</button>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Content Preview Ascending</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="works-table"></tbody>
        </table>
      </div>
      <h3>Add New Work</h3>
      <form>
        <input id="title-works" placeholder="Title">
        <textarea id="content-works" placeholder="Content"></textarea>
        <button type="button" onclick="addItem('works')">
          Add Work
        </button>
      </form>
      <h3>Edit Work</h3>
      <form id="edit-form-works" style="display: none;">
        <input type="hidden" id="edit-id-works">
        <input id="edit-title-works" placeholder="Title">
        <textarea id="edit-content-works" placeholder="Content"></textarea>
        <button type="button" onclick="updateItem('works')">
          Update
        </button>
        <button type="button" onclick="cancelEdit('works')">
          Cancel
        </button>
      </form>
    </div>

    <div id="reviews" class="section">
      <h2>Reviews Management</h2>
      <button onclick="loadData('reviews')">
        Refresh
      </button>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Content Preview</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reviews-table"></tbody>
        </table>
      </div>
      <h3>Add New Review</h3>
      <form>
        <input id="title-reviews" placeholder="Title">
        <textarea id="content-reviews" placeholder="Content"></textarea>
        <button type="button" onclick="addItem('reviews')">
          Add Review
        </button>
      </form>
      <h3>Edit Review</h3>
      <form id="edit-form-reviews" style="display: none;">
        <input type="hidden" id="edit-id-reviews">
        <input id="edit-title-reviews" placeholder="Title">
        <textarea id="edit-content-reviews" placeholder="Content"></textarea>
        <button type="button" onclick="updateItem('reviews')">
          Update
        </button>
        <button type="button" onclick="cancelEdit('reviews')">
          Cancel
        </button>
      </form>
    </div>

    <div id="news" class="section">
      <h2>News Management</h2>
      <button onclick="loadData('news')">
        Refresh
      </button>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Content Preview</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="news-table"></tbody>
        </table>
      </div>
      <h3>Add New News</h3>
      <form>
        <input id="title-news" placeholder="Title">
        <textarea id="content-news" placeholder="Content"></textarea>
        <button type="button" onclick="addItem('news')">
          Add News
        </button>
      </form>
      <h3>Edit News</h3>
      <form id="edit-form-news" style="display: none;">
        <input type="hidden" id="edit-id-news">
        <input id="edit-title-news" placeholder="Title">
        <textarea id="edit-content-news" placeholder="Content"></textarea>
        <button type="button" onclick="updateItem('news')">
          Update
        </button>
        <button type="button" onclick="cancelEdit('news')">
          Cancel
        </button>
      </form>
    </div>
  </div>
  <script>
    let token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/landing.html';
    }
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };
    let currentTab = 'works';

    function switchTab(tabName) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      currentTab = tabName;
      loadData(tabName);
    }

    async function loadData(collection) {
      try {
        const res = await fetch(`/api/${collection}`, { headers });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const tbody = document.getElementById(`${collection}-table`);
        tbody.innerHTML = '';
        data.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.title || ''}</td>
            <td>${(item.content || '').substring(0, 100)}${(item.content || '').length > 100 ? '...' : ''}</td>
            <td>
              <button onclick="editItem('${collection}', ${item.id})">Edit</button>
              <button class="delete-btn" onclick="deleteItem('${collection}', ${item.id})">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        alert('Error loading data: ' + e.message);
      }
    }

    async function addItem(collection) {
      const title = document.getElementById(`title-${collection}`).value.trim();
      const content = document.getElementById(`content-${collection}`).value.trim();
      if (!title) return alert('Title required');
      try {
        const res = await fetch(`/api/${collection}`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ title, content })
        });
        if (res.ok) {
          document.getElementById(`title-${collection}`).value = '';
          document.getElementById(`content-${collection}`).value = '';
          loadData(collection);
        } else {
          const err = await res.json();
          alert('Error adding: ' + (err.error || 'Unknown'));
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function editItem(collection, id) {
      try {
        const res = await fetch(`/api/${collection}/${id}`, { headers });
        if (!res.ok) throw new Error('Item not found');
        const item = await res.json();
        document.getElementById(`edit-id-${collection}`).value = item.id;
        document.getElementById(`edit-title-${collection}`).value = item.title || '';
        document.getElementById(`edit-content-${collection}`).value = item.content || '';
        document.getElementById(`edit-form-${collection}`).style.display = 'block';
      } catch (e) {
        alert('Error loading item: ' + e.message);
      }
    }

    async function updateItem(collection) {
      const id = parseInt(document.getElementById(`edit-id-${collection}`).value);
      const title = document.getElementById(`edit-title-${collection}`).value.trim();
      const content = document.getElementById(`edit-content-${collection}`).value.trim();
      if (!title) return alert('Title required');
      try {
        const res = await fetch(`/api/${collection}/${id}`, {
          method: 'PUT',
          headers,
          body: JSON.stringify({ title, content })
        });
        if (res.ok) {
          cancelEdit(collection);
          loadData(collection);
        } else {
          const err = await res.json();
          alert('Error updating: ' + (err.error || 'Unknown'));
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function cancelEdit(collection) {
      document.getElementById(`edit-form-${collection}`).style.display = 'none';
    }

    async function deleteItem(collection, id) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      try {
        const delHeaders = { 'Authorization': `Bearer ${token}` };
        const res = await fetch(`/api/${collection}/${id}`, {
          method: 'DELETE',
          headers: delHeaders
        });
        if (res.ok) {
          loadData(collection);
        } else {
          alert('Error deleting');
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/landing.html';
    }

    window.addEventListener('load', () => {
      switchTab('works');
    });
  </script>
</body>
</html>
